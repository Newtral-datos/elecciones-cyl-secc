<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elecciones CyL 2026 — Resultados por sección censal</title>

  <!-- MapLibre GL JS -->
  <script src="https://unpkg.com/maplibre-gl@4.1.2/dist/maplibre-gl.js"></script>
  <link href="https://unpkg.com/maplibre-gl@4.1.2/dist/maplibre-gl.css" rel="stylesheet" />

  <!-- PMTiles plugin -->
  <script src="https://unpkg.com/pmtiles@3.0.7/dist/pmtiles.js"></script>

  <!-- Geocoder -->
  <script src="https://unpkg.com/@maplibre/maplibre-gl-geocoder@1.5.0/dist/maplibre-gl-geocoder.min.js"></script>
  <link href="https://unpkg.com/@maplibre/maplibre-gl-geocoder@1.5.0/dist/maplibre-gl-geocoder.css" rel="stylesheet" />

  <style>
    :root {
      --accent: #01f3b3;
      --accent-dark: #00A983;
      --font-main: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-main);
      background: #f3f4f5;
    }

    #map {
      width: 100%;
      height: 100vh;
    }

    .maplibregl-popup-content {
      background: white;
      border-radius: 6px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.18);
      padding: 12px 14px 10px;
      font-family: var(--font-main);
      border: 2px solid #000;
    }

    .popup-title {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 2px;
      color: #1f2937;
    }

    .popup-subtitle {
      font-size: 11px;
      color: #6b7280;
      margin-bottom: 8px;
    }

    .popup-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    .popup-table tbody tr:not(:last-child) td {
      border-bottom: 1px solid #f3f4f6;
    }

    .td-partido {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 4px 4px 0;
      font-weight: 400;
      color: #374151;
      white-space: nowrap;
    }

    .td-num {
      text-align: right;
      padding: 4px 4px 4px 8px;
      color: #374151;
      white-space: nowrap;
    }

    .td-pct {
      text-align: right;
      padding: 4px 0 4px 4px;
      color: #9ca3af;
      font-size: 11px;
      white-space: nowrap;
    }

    .td-bold { font-weight: 700; }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
      display: inline-block;
    }

    .popup-meta {
      font-size: 10px;
      color: #9ca3af;
      margin-top: 8px;
      padding-top: 6px;
      border-top: 1px solid #f3f4f6;
    }

    .maplibregl-popup-close-button {
      font-size: 16px;
      padding: 4px 8px;
      color: #6b7280;
    }

    .maplibregl-popup-close-button:hover {
      color: #1f2937;
      background: transparent;
    }

    .controls-container {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .legend {
      background: rgba(15, 15, 20, 0.82);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 12px;
      padding: 12px 12px 10px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.22), inset 0 1px 0 rgba(255,255,255,0.06);
      display: flex;
      flex-direction: column;
      gap: 5px;
      min-width: 152px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .legend-header {
      margin-bottom: 4px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .legend-title {
      font-size: 11px;
      font-weight: 700;
      color: rgba(255,255,255,0.92);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      line-height: 1.2;
    }

    .legend-hint {
      font-size: 9.5px;
      color: rgba(255,255,255,0.38);
      margin-top: 2px;
      letter-spacing: 0.02em;
    }

    .legend-item {
      display: block;
      width: 100%;
      padding: 4px 10px;
      border-radius: 3px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.03em;
      color: white;
      text-align: center;
      cursor: pointer;
      border: none;
      transition: opacity 0.2s, filter 0.2s, transform 0.12s;
      user-select: none;
      text-shadow: 0 1px 3px rgba(0,0,0,0.3);
      filter: saturate(0.95) brightness(1.05);
    }

    .legend-item:hover {
      transform: translateX(2px);
      filter: saturate(1.1) brightness(1.1);
    }

    .legend-item:active {
      transform: translateX(0);
    }

    .legend-item.off {
      opacity: 0.18;
      filter: saturate(0) brightness(0.8);
    }

    #legend-items {
      display: flex;
      flex-direction: column;
      gap: 4px;
      overflow: hidden;
      transition: max-height 0.25s ease, opacity 0.2s;
      max-height: 400px;
      opacity: 1;
    }

    .legend.collapsed #legend-items {
      max-height: 0;
      opacity: 0;
      pointer-events: none;
    }

    .legend-header {
      cursor: pointer;
    }

    .legend-arrow {
      color: rgba(255,255,255,0.5);
      font-size: 14px;
      line-height: 1;
      transition: transform 0.2s;
      flex-shrink: 0;
    }

    .legend.collapsed .legend-arrow {
      transform: rotate(-90deg);
    }

    #geocoder-container {
      position: absolute;
      top: 10px;
      right: 50px;
      z-index: 1000;
    }

    .maplibregl-ctrl-geocoder {
      min-width: 240px;
      border-radius: 4px !important;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1) !important;
      border: none !important;
    }

    .maplibregl-ctrl-geocoder input {
      border-radius: 4px !important;
      height: 36px !important;
    }

    .maplibregl-ctrl-geocoder .suggestions {
      border-radius: 4px !important;
    }

    /* Responsive para móviles */
    @media (max-width: 600px) {
      #geocoder-container {
        top: 10px;
        left: 10px;
        right: 10px;
      }

      .maplibregl-ctrl-geocoder {
        min-width: 100% !important;
        max-width: 100% !important;
        width: 100% !important;
        font-size: 12px !important;
        border-radius: 4px !important;
      }

      .maplibregl-ctrl-geocoder input {
        font-size: 13px !important;
        height: 32px !important;
        padding-left: 28px !important;
        border-radius: 4px !important;
      }

      .maplibregl-ctrl-geocoder--icon-search {
        top: 50% !important;
        transform: translateY(-50%) !important;
        left: 8px !important;
        width: 16px !important;
        height: 16px !important;
      }

      .controls-container {
        top: 56px;
        left: 10px;
        right: 10px;
      }

      .legend {
        padding: 8px 10px;
        gap: 6px;
        min-width: unset;
        flex-direction: column;
        flex-wrap: nowrap;
        align-items: flex-start;
        border-radius: 8px;
      }

      .legend-header {
        width: 100%;
        margin-bottom: 0;
        padding-bottom: 0;
        border-bottom: none;
        display: flex;
        align-items: center;
        justify-content: space-between;
        cursor: pointer;
        gap: 10px;
      }

      .legend-arrow {
        color: rgba(255,255,255,0.5);
        font-size: 14px;
        line-height: 1;
        transition: transform 0.2s;
        flex-shrink: 0;
      }

      .legend.collapsed .legend-arrow {
        transform: rotate(-90deg);
      }

      .legend-title {
        font-size: 10px;
        letter-spacing: 0.06em;
      }

      .legend-hint {
        font-size: 8px;
      }

      #legend-items {
        display: flex;
        flex-wrap: wrap;
        gap: 3px;
        width: 100%;
        overflow: hidden;
        transition: max-height 0.25s ease, opacity 0.2s;
        max-height: 200px;
        opacity: 1;
      }

      .legend.collapsed #legend-items {
        max-height: 0;
        opacity: 0;
        pointer-events: none;
      }

      .legend-item {
        width: auto;
        flex: 1 1 auto;
        padding: 3px 6px;
        font-size: 9px;
        border-radius: 3px;
        text-shadow: none;
      }

      .maplibregl-ctrl-top-right {
        top: auto !important;
        bottom: 30px !important;
        right: 10px !important;
      }
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="geocoder-container"></div>

  <div class="controls-container">
    <div class="legend" id="legend">
      <div class="legend-header" id="legend-toggle">
        <div>
          <div class="legend-title">Partido más votado</div>
          <div class="legend-hint">Pulsa para filtrar</div>
        </div>
        <span class="legend-arrow" id="legend-arrow">▾</span>
      </div>
      <div id="legend-items"></div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
